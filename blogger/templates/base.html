<!DOCTYPE html>
<html>
<head>
    <title>Django Blog</title>
    <style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background-color: #f5f6fa;
    }

    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #111827;
        padding: 15px 40px;
    }

    nav a {
        color: #ffffff;
        text-decoration: none;
        margin-left: 20px;
        font-weight: 500;
    }

    nav a:hover {
        color: #60a5fa;
    }

    .container {
        width: 65%;
        margin: 40px auto;
    }

    .blog-card {
        background: #ffffff;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 20px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .blog-card h3 {
        margin: 0;
        color: #111827;
    }

    .blog-meta {
        color: #6b7280;
        font-size: 14px;
        margin-top: 5px;
    }

    .blog-actions a {
        margin-right: 15px;
        color: #2563eb;
        font-weight: 500;
        text-decoration: none;
    }

    .blog-actions a:hover {
        text-decoration: underline;
    }

    button {
        background-color: #2563eb;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background-color: #1d4ed8;
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 6px;
        border: 1px solid #ddd;
    }
</style>
</head>
<body>

<nav style="display: flex; justify-content: space-between; align-items: center; background-color: #222; padding: 15px;">

    <!-- LEFT SIDE -->
    <div>
        <a href="{% url 'home' %}" style="color:white; text-decoration:none;">Home</a>
    </div>

    <!-- RIGHT SIDE -->
    <div>
        {% if user.is_authenticated %}
            <a href="{% url 'create' %}" style="color:white; margin-right:15px;">Create</a>
            <span style="color:white; margin-right:15px;">Hello {{ user.username }}</span>
            <form method="POST" action="{% url 'logout' %}" style="display:inline;">
    {% csrf_token %}
    <button type="submit" style="background:none; border:none; color:white; cursor:pointer; padding:0;">
        Logout
    </button>
</form>
        {% else %}
            <a href="{% url 'login' %}" style="color:white; margin-right:15px;">Login</a>
            <a href="{% url 'signup' %}" style="color:white;">Sign Up</a>
        {% endif %}
    </div>

</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
